<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nazozokc about pages</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1a1f;
  --bg-secondary: #24242b;
  --fg: #d4d4d8;
  --green: #9cab87;
  --blue: #8ba4b0;
  --red: #c4746e;
  --yellow: #d4b87a;
  --purple: #a292a3;
  --gray: #71717a;
  --bar: rgba(26, 26, 31, 0.8);
  --glow-green: rgba(156, 171, 135, 0.4);
  --glow-blue: rgba(139, 164, 176, 0.4);
  --glow-yellow: rgba(212, 184, 122, 0.3);
  --glass: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.1);
}

* {
  box-sizing: border-box;
}

body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular,
               Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  margin: 0;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: 
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(156, 171, 135, 0.12), transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(139, 164, 176, 0.1), transparent),
    radial-gradient(ellipse 50% 30% at 50% 50%, rgba(212, 184, 122, 0.05), transparent);
  pointer-events: none;
  z-index: 0;
}

/* Top bar */
.top-bar {
  position: -webkit-sticky;
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bar);
  border-bottom: 1px solid var(--glass-border);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  backdrop-filter: blur(20px) saturate(180%);
  box-shadow: 0 1px 20px rgba(0, 0, 0, 0.15);
}

.top-bar-inner {
  max-width: 900px;
  margin: 0 auto;
  padding: 0.75rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.top-bar-title {
  color: var(--gray);
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.status-dot {
  width: 8px;
  height: 8px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
  box-shadow: 0 0 10px var(--glow-green), 0 0 20px var(--glow-green);
  position: relative;
}

.status-dot::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 1px solid var(--green);
  opacity: 0;
  animation: ripple 2s ease-out infinite;
}

@keyframes ripple {
  0% { transform: scale(0.8); opacity: 0.6; }
  100% { transform: scale(2); opacity: 0; }
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.9); }
}

.top-bar-links {
  display: flex;
  gap: 1rem;
}

.top-bar-links a {
  color: var(--blue);
  text-decoration: none;
  font-size: 0.85rem;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  padding: 0.25rem 0.5rem;
  border-radius: 4px;
}

.top-bar-links a:hover {
  color: var(--yellow);
  text-shadow: 0 0 10px var(--glow-blue), 0 0 20px var(--glow-yellow);
  background: rgba(196, 178, 138, 0.1);
}

.top-bar-links a::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  width: 0;
  height: 1px;
  background: var(--yellow);
  transition: width 0.3s ease;
}

.top-bar-links a:hover::after {
  width: 100%;
}

/* Terminal container */
.terminal-container {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
  position: relative;
  z-index: 1;
}

.terminal-output {
  min-height: 50vh;
}

/* Output lines */
.output-line {
  opacity: 0;
  animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  margin: 0.25rem 0;
  line-height: 1.6;
}

@keyframes fadeIn {
  from { 
    opacity: 0; 
    transform: translateY(10px) scale(0.98);
    filter: blur(4px);
  }
  to { 
    opacity: 1; 
    transform: translateY(0) scale(1);
    filter: blur(0);
  }
}

/* Prompt colors */
.prompt-user { color: var(--green); }
.prompt-path { color: var(--blue); }
.accent { color: var(--yellow); }
.muted { color: var(--gray); }

/* Command highlight */
.cmd-highlight {
  color: var(--yellow);
  text-shadow: 0 0 8px var(--glow-yellow), 0 0 16px var(--glow-yellow);
  font-weight: 500;
}

/* Input line */
.input-line {
  display: flex;
  align-items: center;
  font-size: 1rem;
  padding: 0.5rem 0;
  border-top: 1px solid var(--glass-border);
  margin-top: 1.5rem;
  padding-top: 1.25rem;
  position: relative;
}

.input-line::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--glow-green), transparent);
  opacity: 0.5;
}

#cmdInput {
  background: transparent;
  border: none;
  outline: none;
  color: var(--fg);
  font-family: inherit;
  font-size: 1rem;
  flex: 1;
  margin-left: 0.5rem;
  caret-color: var(--yellow);
  text-shadow: 0 0 5px rgba(197, 201, 197, 0.3);
  padding: 0.25rem 0.5rem;
  border-radius: 4px;
  transition: all 0.2s ease;
}

#cmdInput:focus {
  background: rgba(255, 255, 255, 0.03);
  box-shadow: 0 0 0 1px var(--glass-border);
}

.cursor-blink {
  color: var(--yellow);
  animation: blink 1s step-end infinite;
  text-shadow: 0 0 10px var(--glow-yellow);
}

@keyframes blink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0; }
}

/* Click commands */
.click-commands {
  margin-top: 2rem;
  padding: 1.25rem;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  -webkit-backdrop-filter: blur(15px);
  backdrop-filter: blur(15px);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
}

.click-commands:hover {
  border-color: rgba(139, 164, 176, 0.25);
  background: rgba(255, 255, 255, 0.07);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
  transform: translateY(-2px);
}

.click-header {
  color: var(--gray);
  font-size: 0.8rem;
  margin-bottom: 1rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.click-grid {
  display: grid;
  gap: 0.5rem;
}

.click-item {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.75rem 1rem;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
}

.click-item::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 0;
  background: linear-gradient(90deg, var(--glow-blue), transparent);
  transition: width 0.3s ease;
}

.click-item:hover {
  background: rgba(139, 164, 176, 0.12);
  transform: translateX(8px);
}

.click-item:hover::before {
  width: 3px;
}

.click-item:hover .click-cmd {
  color: var(--yellow);
  text-shadow: 0 0 12px var(--glow-yellow);
}

.click-item:active {
  transform: translateX(8px) scale(0.98);
}

.click-num {
  color: var(--gray);
  font-size: 0.85rem;
}

.click-cmd {
  color: var(--blue);
  transition: all 0.2s ease;
}

.click-desc {
  color: var(--gray);
  font-size: 0.85rem;
}

/* Markdown content */
.md {
  margin: 1.5rem 0;
  padding: 1.5rem;
  background: var(--glass);
  border-left: 3px solid var(--yellow);
  border-radius: 0 12px 12px 0;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
}

.md h1 {
  color: var(--yellow);
  font-size: 1.4em;
  margin: 1em 0 0.5em;
  padding-bottom: 0.4em;
  border-bottom: 1px solid var(--glass-border);
  text-shadow: 0 0 20px var(--glow-yellow);
}

.md h2 {
  color: var(--blue);
  margin: 1em 0 0.5em;
  text-shadow: 0 0 10px var(--glow-blue);
}

.md ul {
  margin-left: 1.2em;
  list-style: disc;
}

.md p {
  margin: 0.5em 0;
  line-height: 1.7;
}

.md a {
  color: var(--blue);
  text-decoration: none;
  transition: color 0.2s ease;
}

.md a:hover {
  color: var(--yellow);
  text-decoration: underline;
}

.md code {
  background: rgba(255, 255, 255, 0.08);
  padding: 0.15em 0.4em;
  border-radius: 4px;
  font-size: 0.9em;
}

.md pre {
  background: rgba(255, 255, 255, 0.06);
  padding: 1em;
  border-radius: 8px;
  overflow-x: auto;
}

/* Back to top */
.back-top {
  cursor: pointer;
  color: var(--yellow);
  margin-top: 1rem;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.6rem 1.2rem;
  background: rgba(196, 178, 138, 0.1);
  border-radius: 6px;
  border: 1px solid transparent;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.back-top:hover {
  background: rgba(196, 178, 138, 0.2);
  border-color: var(--glass-border);
  transform: translateX(5px);
  box-shadow: 0 0 15px var(--glow-yellow);
}

/* Loading spinner */
.loading {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  animation: loadingPulse 1.5s ease-in-out infinite;
}

.loading::after {
  content: '';
  width: 14px;
  height: 14px;
  border: 2px solid transparent;
  border-top-color: var(--yellow);
  border-right-color: var(--yellow);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  box-shadow: 0 0 10px var(--glow-yellow);
}

@keyframes loadingPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Error style */
.error-msg {
  color: var(--red);
  text-shadow: 0 0 10px rgba(196, 116, 110, 0.5);
}

/* Repository item */
.repo-item {
  padding: 1rem 1.25rem;
  margin: 0.75rem 0;
  background: var(--glass);
  border-radius: 10px;
  border-left: 3px solid var(--blue);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
}

.repo-item:hover {
  background: rgba(255, 255, 255, 0.08);
  transform: translateX(8px);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12), 0 0 20px var(--glow-blue);
}

.repo-name {
  color: var(--yellow);
  font-weight: 600;
  text-shadow: 0 0 10px var(--glow-yellow);
}

.repo-desc {
  color: var(--gray);
  font-size: 0.9rem;
  margin-top: 0.35rem;
}

.repo-url {
  color: var(--blue);
  font-size: 0.85rem;
  text-decoration: none;
  display: inline-block;
  margin-top: 0.35rem;
  padding: 0.25rem 0.5rem;
  border-radius: 4px;
  transition: all 0.2s ease;
}

.repo-url:hover {
  text-decoration: none;
  background: rgba(139, 164, 176, 0.15);
  text-shadow: 0 0 8px var(--glow-blue);
}

/* Responsive */
@media (max-width: 640px) {
  .terminal-container {
    padding: 1rem;
  }

  .top-bar-inner {
    padding: 0.75rem 1rem;
  }

  .input-line {
    flex-wrap: wrap;
  }

  #cmdInput {
    width: 100%;
  }
}

/* External link indicator */
.repo-url::after {
  content: ' ↗';
  font-size: 0.75em;
  opacity: 0.6;
}

/* Prompt glow */
.prompt-user, .prompt-path {
  text-shadow: 0 0 8px currentColor;
}

/* Skill tags */
.skill-tag {
  display: inline-block;
  padding: 0.2rem 0.6rem;
  margin: 0.15rem;
  border-radius: 4px;
  font-size: 0.9rem;
  transition: all 0.2s ease;
}

.skill-tag.primary {
  background: rgba(196, 178, 138, 0.15);
  color: var(--yellow);
}

.skill-tag.secondary {
  background: rgba(255, 255, 255, 0.05);
  color: var(--gray);
}

/* Command execution flash */
@keyframes cmdFlash {
  0% { background: rgba(196, 178, 138, 0.1); }
  100% { background: transparent; }
}

.output-line:has(.cmd-highlight) {
  animation: cmdFlash 0.5s ease-out;
  padding: 0.25rem 0.5rem;
  margin: 0.25rem -0.5rem;
  border-radius: 4px;
}

/* Selection styling */
::selection {
  background: rgba(196, 178, 138, 0.3);
  color: var(--fg);
}

/* Scrollbar */
::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--gray);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--blue);
}
</style>

<script>
let terminal, cmdInput;

document.addEventListener('DOMContentLoaded', () => {
  terminal = document.getElementById("terminal");
  cmdInput = document.getElementById("cmdInput");

  if (!terminal || !cmdInput) {
    console.error("DOM elements not found");
    return;
  }

  cmdInput.addEventListener("keydown", async (e) => {
    if (e.key === "Enter") {
      const cmd = cmdInput.value.trim();
      if (!cmd) return;
      cmdInput.value = "";
      await executeCommand(cmd);
    }
  });

  document.querySelectorAll('.click-item').forEach(item => {
    item.addEventListener('click', () => {
      const cmd = item.dataset.cmd;
      executeCommand(cmd);
    });
  });

  initTerminal();
});

function createOutputLine(content, className = '') {
  const line = document.createElement('div');
  line.className = `output-line ${className}`;
  line.innerHTML = content;
  terminal.appendChild(line);
  scrollToBottom();
  return line;
}

async function typeText(text, element, speed = 12) {
  let i = 0;
  return new Promise(resolve => {
    const interval = setInterval(() => {
      if (i < text.length) {
        element.textContent += text[i];
        i++;
        scrollToBottom();
      } else {
        clearInterval(interval);
        resolve();
      }
    }, speed);
  });
}

async function appendLines(lines, delay = 15) {
  for (const line of lines) {
    const el = createOutputLine('');
    await typeText(line, el, delay);
    await sleep(30);
  }
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function scrollToBottom() {
  const scrollHeight = document.body.scrollHeight;
  if ('scrollBehavior' in document.documentElement.style) {
    window.scrollTo({
      top: scrollHeight,
      behavior: 'smooth'
    });
  } else {
    window.scrollTo(0, scrollHeight);
  }
}

async function executeCommand(cmd) {
  createOutputLine(
    `<span class="prompt-user">nazozokc@arch</span>:<span class="prompt-path">~</span>$ <span class="cmd-highlight">${escapeHtml(cmd)}</span>`
  );
  await sleep(100);

  switch (cmd) {
    case "neovim":
      await handleNeovim();
      break;
    case "nix":
      await handleNix();
      break;
    case "wezterm":
      await handleWezterm();
      break;
    case "X":
      createOutputLine('<a href="https://x.com/@NazozoK6519" target="_blank" class="repo-url">https://x.com/@NazozoK6519</a>');
      break;
    case "github":
      await handleGithub();
      break;
    case ":q":
      await handleQuit();
      break;
    case "clear":
      handleClear();
      break;
    default:
      createOutputLine(`<span class="error-msg">command not found: ${escapeHtml(cmd)}</span>`);
  }
}

async function handleNeovim() {
  await appendLines([
    "",
    "  ╭──────────────────────────────────────────────╮",
    "  │           Neovim Environment                 │",
    "  ├──────────────────────────────────────────────┤",
    "  │  manager   │  lazy.nvim                      │",
    "  │  theme     │  kanagawa-dragon                │",
    "  │  policy    │  軽さ / 自作 / 可読性            │",
    "  ├──────────────────────────────────────────────┤",
    "  │  LSP       │  lua_ls, ts_ls, html, nixd      │",
    "  │  finder    │  snacks.nvim, telescope         │",
    "  │  status    │  lualine, noice, nvim-notify    │",
    "  │  git       │  gitsigns, lazygit, octo        │",
    "  │  debug     │  nvim-dap, neotest              │",
    "  ├──────────────────────────────────────────────┤",
    "  │  leader    │  Space                          │",
    "  │  indent    │  2 spaces                       │",
    "  ╰──────────────────────────────────────────────╯",
    ""
  ], 10);
}

async function handleNix() {
  await appendLines([
    "",
    "  ╭──────────────────────────────────────────────╮",
    "  │              Nix Environment                 │",
    "  ├──────────────────────────────────────────────┤",
    "  │  system    │  Linux / macOS (cross-platform) │",
    "  │  manager   │  home-manager / nix-darwin      │",
    "  │  shell     │  fish                           │",
    "  ├──────────────────────────────────────────────┤",
    "  │  packages  │  neovim, vscode, zed            │",
    "  │  cli       │  jq, bat, fzf, zoxide, yazi     │",
    "  │  dev       │  nodejs, bun, deno, rustc       │",
    "  │  tools     │  git, gh, ghq, lazygit          │",
    "  ├──────────────────────────────────────────────┤",
    "  │  command   │  nix run .#switch               │",
    "  ╰──────────────────────────────────────────────╯",
    ""
  ], 10);
}

async function handleWezterm() {
  await appendLines([
    "",
    "  ╭──────────────────────────────────────────────╮",
    "  │            WezTerm Environment               │",
    "  ├──────────────────────────────────────────────┤",
    "  │  config    │  lua (modular)                  │",
    "  │  theme     │  kanagawa (custom palette)      │",
    "  │  opacity   │  0.90 (toggle: Ctrl+Shift+F)    │",
    "  ├──────────────────────────────────────────────┤",
    "  │  split-h   │  Ctrl+Shift+E                   │",
    "  │  split-v   │  Ctrl+Shift+D                   │",
    "  │  focus     │  Ctrl+Shift+h/j/k/l             │",
    "  │  resize    │  Ctrl+Shift+Alt+h/j/k/l         │",
    "  │  tab       │  Ctrl+Shift+T / W               │",
    "  │  fullscreen│  Alt+Enter                      │",
    "  ├──────────────────────────────────────────────┤",
    "  │  ime       │  enabled (Japanese input)       │",
    "  ╰──────────────────────────────────────────────╯",
    ""
  ], 10);
}

async function handleGithub() {
  const loading = createOutputLine('<span class="loading">loading github info</span>');

  try {
    const userRes = await fetch("https://api.github.com/users/nazozokc");
    const user = await userRes.json();
    loading.remove();
    
    createOutputLine("<span class='accent'>GitHub Profile:</span>");
    createOutputLine("");
    createOutputLine(`<span class='repo-name'>${escapeHtml(user.name || "nazozokc")}</span>`);
    createOutputLine(`<span class="muted">${escapeHtml(user.bio || "")}</span>`);
    createOutputLine(`<a href="${user.html_url}" target="_blank" class="repo-url">${user.html_url}</a>`);
    createOutputLine("");
    createOutputLine(`<span class="muted">repos: ${user.public_repos}</span> | <span class="muted">followers: ${user.followers}</span> | <span class="muted">following: ${user.following}</span>`);
    createOutputLine("");

    const loading2 = createOutputLine('<span class="loading">loading commit stats</span>');

    const reposRes = await fetch("https://api.github.com/users/nazozokc/repos?per_page=100");
    const repos = await reposRes.json();
    const ownRepos = repos.filter(r => !r.fork);

    const repoCommits = [];
    let totalCommits = 0;

    for (const repo of ownRepos) {
      try {
        const commitsRes = await fetch(`https://api.github.com/repos/nazozokc/${repo.name}/commits?per_page=1`);
        const linkHeader = commitsRes.headers.get('link') || '';
        const lastPageMatch = linkHeader.match(/page=(\d+)>; rel="last"/);
        const commitCount = lastPageMatch ? parseInt(lastPageMatch[1]) : 1;
        
        repoCommits.push({ name: repo.name, commits: commitCount, url: repo.html_url });
        totalCommits += commitCount;
      } catch {
        repoCommits.push({ name: repo.name, commits: 0, url: repo.html_url });
      }
    }

    loading2.remove();

    createOutputLine(`<span class='accent'>total commits:</span> ${totalCommits}`);
    createOutputLine("");
    createOutputLine("<span class='accent'>top 3 repositories by commits:</span>");
    createOutputLine("");

    const top3 = repoCommits.sort((a, b) => b.commits - a.commits).slice(0, 3);
    
    for (const repo of top3) {
      createOutputLine(`<span class='repo-name'>${escapeHtml(repo.name)}</span> - ${repo.commits} commits`);
      createOutputLine(`<a href="${repo.url}" target="_blank" class="repo-url">${repo.url}</a>`);
      createOutputLine("");
    }

    createOutputLine('<a href="https://github.com/nazozokc" target="_blank" class="repo-url">view all repos →</a>');

  } catch (err) {
    loading.remove();
    createOutputLine('<span class="error-msg">error: failed to load github info</span>');
  }
}

async function handleQuit() {
  terminal.innerHTML = "";
  await sleep(100);
  await initTerminal();
}

function handleClear() {
  terminal.innerHTML = "";
}

function displayMarkdown(md, showBackTop = false) {
  if (typeof marked === 'undefined') {
    createOutputLine('<span class="error-msg">error: markdown parser not loaded</span>');
    return;
  }
  const div = document.createElement("div");
  div.className = "md";
  div.innerHTML = marked.parse(md);
  terminal.appendChild(div);
  scrollToBottom();

  if (showBackTop) {
    displayBackTop();
  }
}

function displayBackTop() {
  const backTop = document.createElement("div");
  backTop.className = "back-top";
  backTop.innerHTML = "← [top]";
  backTop.onclick = () => {
    terminal.innerHTML = "";
    initTerminal();
  };
  terminal.appendChild(backTop);
  scrollToBottom();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

async function initTerminal() {
  terminal.innerHTML = "";

  createOutputLine(
    `<span class="prompt-user">nazozokc@arch</span>:<span class="prompt-path">~</span>$ <span class="cmd-highlight">whoami</span>`
  );
  await sleep(150);
  createOutputLine("nazozokc");
  await sleep(250);

  createOutputLine(
    `<span class="prompt-user">nazozokc@arch</span>:<span class="prompt-path">~</span>$ <span class="cmd-highlight">cat about.txt</span>`
  );
  await sleep(150);
  await appendLines([
    "中学生プログラマ",
    "Arch Linux / Neovim / TypeScript",
    "API開発・CLIツール・環境構築が好き"
  ], 18);
  await sleep(250);

  createOutputLine(
    `<span class="prompt-user">nazozokc@arch</span>:<span class="prompt-path">~</span>$ <span class="cmd-highlight">ls skills/</span>`
  );
  await sleep(150);
  createOutputLine("<span class='skill-tag primary'>TypeScript</span><span class='skill-tag secondary'>JavaScript</span><span class='skill-tag secondary'>Node.js</span>");
  createOutputLine("<span class='skill-tag secondary'>React</span><span class='skill-tag secondary'>Linux</span><span class='skill-tag secondary'>Neovim</span>");
  await sleep(250);

  createOutputLine(
    `<span class="prompt-user">nazozokc@arch</span>:<span class="prompt-path">~</span>$ <span class="cmd-highlight">ls projects/</span>`
  );
  await sleep(200);

  const loading = createOutputLine('<span class="loading">loading repositories</span>');

  try {
    const response = await fetch("https://api.github.com/users/nazozokc/repos?sort=updated");
    const repos = await response.json();
    loading.remove();

    const filteredRepos = repos.filter(r => !r.fork).slice(0, 6);

    for (const repo of filteredRepos) {
      const repoDiv = document.createElement('div');
      repoDiv.className = 'repo-item';
      repoDiv.innerHTML = `
        <div class="repo-name">${escapeHtml(repo.name)}</div>
        <div class="repo-desc">${escapeHtml(repo.description || "no description")}</div>
        <a href="${repo.html_url}" target="_blank" class="repo-url">${repo.html_url}</a>
      `;
      terminal.appendChild(repoDiv);
      await sleep(100);
      scrollToBottom();
    }

    await sleep(200);
    createOutputLine("");
    createOutputLine("<span class='muted'>select command from below ↓</span>");

  } catch (err) {
    loading.remove();
    createOutputLine('<span class="error-msg">error: failed to load repositories</span>');
  }
}
