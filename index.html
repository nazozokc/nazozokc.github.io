<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="nazozokcのポートフォリオ。中学生プログラマとしての活動や技術スタック、プロジェクト情報を提供しています。">
<title>nazozokc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="index.css">
</head>
<body>
<!-- Top bar -->
<header class="top-bar" role="banner">
  <div class="top-bar-inner">
    <div class="top-bar-title">
      <span class="status-dot" aria-hidden="true"></span>
      nazozokc@arch — terminal
    </div>
    <nav class="top-bar-links" aria-label="External links">
      <a href="https://x.com/@NazozoK6519" target="_blank" rel="noopener noreferrer" class="link-x">X</a>
      <a href="https://github.com/nazozokc" target="_blank" rel="noopener noreferrer" class="link-gh">GitHub</a>
    </nav>
  </div>
</header>

<!-- Terminal container -->
<main class="terminal-container" role="main">
  <div id="terminal" class="terminal-output" aria-live="polite"></div>

  <!-- Command input -->
  <div class="input-line" role="search">
    <span class="prompt-user" aria-hidden="true">nazozokc@arch</span>:<span class="prompt-path" aria-hidden="true">~</span>$
    <input id="cmdInput" type="text" autocomplete="off" autofocus aria-label="Command input">
    <span class="cursor-blink" aria-hidden="true">▌</span>
  </div>

  <!-- Click commands -->
  <section class="click-commands" aria-label="Click commands">
    <div class="click-header" aria-hidden="true">[click to execute]</div>
    <div class="click-grid">
      <div class="click-item" data-cmd="neovim">
        <span class="click-num">[1]</span>
        <span class="click-cmd">neovim</span>
      </div>
      <div class="click-item" data-cmd="nix">
        <span class="click-num">[2]</span>
        <span class="click-cmd">nix</span>
      </div>
      <div class="click-item" data-cmd="wezterm">
        <span class="click-num">[3]</span>
        <span class="click-cmd">wezterm</span>
      </div>
      <div class="click-item" data-cmd="X">
        <span class="click-num">[4]</span>
        <span class="click-cmd">X</span>
      </div>
      <div class="click-item" data-cmd="github">
        <span class="click-num">[5]</span>
        <span class="click-cmd">github</span>
      </div>
      <div class="click-item" data-cmd=":q">
        <span class="click-num">[6]</span>
        <span class="click-cmd">:q</span>
        <span class="click-desc">(return to top)</span>
      </div>
      <div class="click-item" data-cmd="clear" role="button" tabindex="0">
        <span class="click-num" aria-hidden="true">[7]</span>
        <span class="click-cmd">clear</span>
      </div>
    </div>
  </section>
</main>

<script src="index.js"></script>
</body>
</html>
